openapi: 3.0.3
info:
  title: Otter API
  version: 1.0.0
  description: Otter API - Документация
paths:
  /api/v1/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      description: Отправляет 6-значный код на email. Если пользователь не найден
        — ответ всё равно 200 (без раскрытия).
      summary: Запросить код для сброса пароля
      tags:
      - Восстановление пароля
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Код отправлен
  /api/v1/auth/forgot-password/confirm/:
    post:
      operationId: auth_forgot_password_confirm_create
      description: Устанавливает новый пароль по `reset_token`.
      summary: Установить новый пароль по токену
      tags:
      - Восстановление пароля
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Пароль обновлён
  /api/v1/auth/forgot-password/verify/:
    post:
      operationId: auth_forgot_password_verify_create
      description: Проверяет код. В ответ отдаёт `reset_token`, который нужно использовать
        для установки нового пароля.
      summary: Проверить код и получить токен сброса
      tags:
      - Восстановление пароля
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordVerifyCodeRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Токен сброса выдан
        '400':
          description: Неверный код или истёк срок
  /api/v1/auth/google/:
    post:
      operationId: auth_google_create
      description: Принимает Firebase ID Token, проверяет его через Firebase Admin
        SDK, создаёт/находит пользователя и возвращает JWT токены.
      summary: Вход через Google (Firebase ID Token)
      tags:
      - Авторизация
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Токены выданы
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Возвращает JWT access/refresh токены.
      summary: Вход по email и паролю
      tags:
      - Авторизация
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Токены выданы
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: Создаёт нового пользователя по email и паролю.
      summary: Регистрация пользователя
      tags:
      - Авторизация
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          description: Пользователь создан
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: Принимает refresh токен и возвращает новый access токен (и refresh,
        если включена ротация).
      summary: Обновить access токен
      tags:
      - Авторизация
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          description: Access токен обновлён
  /api/v1/profile/:
    get:
      operationId: profile_retrieve
      description: Возвращает данные текущего пользователя.
      summary: Получить профиль
      tags:
      - Профиль
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
          description: ''
    put:
      operationId: profile_update
      description: Обновляет имя/фамилию/аватар. Для аватара используйте multipart/form-data.
      summary: Обновить профиль (multipart/form-data)
      tags:
      - Профиль
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
          description: ''
    patch:
      operationId: profile_partial_update
      description: Частичное обновление профиля. Для аватара используйте multipart/form-data.
      summary: Частично обновить профиль (multipart/form-data)
      tags:
      - Профиль
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
          description: ''
components:
  schemas:
    ForgotPasswordConfirmRequest:
      type: object
      properties:
        reset_token:
          type: string
          format: uuid
          title: Токен сброса
        new_password:
          type: string
          writeOnly: true
          minLength: 8
          title: Новый пароль
      required:
      - new_password
      - reset_token
    ForgotPasswordRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          title: Электронная почта
      required:
      - email
    ForgotPasswordVerifyCodeRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          title: Электронная почта
        code:
          type: string
          minLength: 1
          title: Код
      required:
      - code
      - email
    GoogleLoginRequest:
      type: object
      properties:
        firebase_token:
          type: string
          minLength: 1
          title: Firebase токен
      required:
      - firebase_token
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          title: Электронная почта
        password:
          type: string
          writeOnly: true
          minLength: 1
          title: Пароль
      required:
      - email
      - password
    PatchedProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          title: Имя
        last_name:
          type: string
          title: Фамилия
        avatar:
          type: string
          format: binary
          nullable: true
          title: Аватар
    Profile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Электронная почта
        first_name:
          type: string
          title: Имя
        last_name:
          type: string
          title: Фамилия
        avatar:
          type: string
          format: uri
          nullable: true
          title: Аватар
      required:
      - email
      - id
    ProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          title: Имя
        last_name:
          type: string
          title: Фамилия
        avatar:
          type: string
          format: binary
          nullable: true
          title: Аватар
    RegistrationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          title: Электронная почта
        password:
          type: string
          writeOnly: true
          minLength: 8
          title: Пароль
        first_name:
          type: string
          title: Имя
        last_name:
          type: string
          title: Фамилия
      required:
      - email
      - password
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
